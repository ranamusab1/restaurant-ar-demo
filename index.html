<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MST AR Menu - Real Scan Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <h1><i class="fas fa-utensils"></i> MST (Private) Limited</h1>
            <p>Premium Photogrammetry AR Menu</p>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h2>Reality in your Browser</h2>
            <p>No App. No Markers. Just Real Food in 3D.</p>
        </div>
    </section>

    <section class="menu">
        <div class="dishes">
            <div class="dish-card">
                <div class="dish-image">
                    <model-viewer src="models/biryani.glb" auto-rotate camera-controls shadow-intensity="1" alt="3D Biryani Scan"></model-viewer>
                </div>
                <div class="dish-info">
                    <h3>Real-Scan Biryani</h3>
                    <p>Experience the texture of every grain of rice in AR.</p>
                    <div class="price-ar">
                        <span class="price">Rs. 850</span>
                        <button class="ar-btn" onclick="openAR('biryani')">
                            <i class="fas fa-cube"></i> View in AR
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function openAR(dish) {
            localStorage.setItem('selectedDish', dish);
            window.location.href = 'ar.html';
        }
    </script>
</body>
</html>
