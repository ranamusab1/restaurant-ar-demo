<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR View - MST Tech</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #ar-engine { width: 100vw; height: 100vh; }
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 10; padding: 12px 25px; background: #ff6b6b; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .instruction-toast { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        .toast-text { background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <button class="back-btn" onclick="window.location.href='index.html'">✕ Close AR</button>

    <div class="instruction-toast">
        <span class="toast-text">Point at a flat surface and move slowly</span>
    </div>

    <model-viewer 
        id="ar-engine"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="2" 
        exposure="1"
        environment-image="neutral"
        ar-placement="floor">
        
        <button slot="ar-button" style="display:none;"></button> </model-viewer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modelViewer = document.querySelector('#ar-engine');
            const selectedDish = localStorage.getItem('selectedDish') || 'biryani';
            
            // Set the model path based on selection
            modelViewer.src = `models/${selectedDish}.glb`;
            modelViewer.iosSrc = `models/${selectedDish}.usdz`;

            // Auto-activate AR if possible
            modelViewer.addEventListener('load', () => {
                modelViewer.activateAR();
            });
        });
    </script>
</body>
</html>
